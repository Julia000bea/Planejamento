<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgendaMed — Nova Consulta</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="/dashboard" class="navbar-brand">🗓️ AgendaMed</a>
    <span class="navbar-info">Agendar Consulta | <a href="/logout">Sair</a></span>
  </nav>

  <div class="container-sm">
    <div class="card">
      <h2 class="card-titulo">Nova Consulta</h2>
      <div id="alerta"></div>

      <form action="/consultas" method="POST" id="formConsulta">
        <div class="form-group">
          <label>Profissional</label>
          <select name="profissionalId" id="selectProf" required>
            <option value="">Selecione o profissional</option>
          </select>
        </div>
        <div class="form-group">
          <label>Especialidade (preenchida automaticamente)</label>
          <input type="text" id="especialidade" readonly placeholder="Cardiologia">
        </div>
        <div class="form-group">
          <label>Data da Consulta</label>
          <input type="date" name="data" id="inputData" required>
        </div>
        <div class="form-group">
          <label>Horário Disponível</label>
          <select name="horario" id="selectHorario" required>
            <option value="">Selecione um horário</option>
          </select>
        </div>
        <div class="form-group">
          <label>Observações (opcional)</label>
          <textarea name="observacoes" placeholder="Descreva seus sintomas ou dúvidas..."></textarea>
        </div>
        <button type="submit" class="btn btn-primary btn-block" style="margin-bottom:10px;">Confirmar Agendamento</button>
        <a href="/consultas" class="btn btn-secondary btn-block" style="text-align:center;">Cancelar</a>
      </form>
    </div>
  </div>

  <script>
    let profissionais = [];
    const params = new URLSearchParams(window.location.search);
    const alerta = document.getElementById('alerta');
    if (params.get('erro')) alerta.innerHTML = `<div class="alert alert-erro">${decodeURIComponent(params.get('erro'))}</div>`;

    // Data mínima = hoje
    document.getElementById('inputData').min = new Date().toISOString().split('T')[0];

    async function carregarProfissionais() {
      const res = await fetch('/profissionais/api');
      profissionais = await res.json();
      const sel = document.getElementById('selectProf');
      profissionais.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.id;
        opt.textContent = `${p.nome} — ${p.especialidade}`;
        sel.appendChild(opt);
      });
      // Pré-seleciona se veio da lista de profissionais
      const profId = params.get('profissionalId');
      if (profId) {
        sel.value = profId;
        sel.dispatchEvent(new Event('change'));
      }
    }

    document.getElementById('selectProf').addEventListener('change', function() {
      const prof = profissionais.find(p => p.id === this.value);
      const esp = document.getElementById('especialidade');
      const selHor = document.getElementById('selectHorario');
      selHor.innerHTML = '<option value="">Selecione um horário</option>';
      if (prof) {
        esp.value = prof.especialidade;
        prof.horarios.forEach(h => {
          const o = document.createElement('option');
          o.value = h; o.textContent = h;
          selHor.appendChild(o);
        });
      } else {
        esp.value = '';
      }
    });

    carregarProfissionais();
  </script>
</body>
</html>
